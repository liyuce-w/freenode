name: Daily Download freenode.yaml

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# 🔑 关键：允许 Actions 推送到仓库
permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run download script
        run: bash scripts/download.sh

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add freenode.yaml
          # 仅当文件有变化时才提交
          git diff --quiet && git diff --staged --quiet || git commit -m "Update freenode.yaml $(date '+%Y-%m-%d %H:%M:%S')"
          git push
