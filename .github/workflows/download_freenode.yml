name: Daily Download freenode.yaml

on:
  schedule:
    # 北京时间每天 12:00 运行 (UTC 4:00)
    - cron: '0/15 * * * *'
  workflow_dispatch:   # 允许手动触发

# 🔑 授予写入权限，允许 git push
permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run download script
        run: bash scripts/download.sh

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 拉取远程最新代码，避免冲突（使用 rebase 保持线性历史）
          git pull --rebase origin ${{ github.ref_name }}
          git add freenode.yaml
          # 仅当文件有变化时才提交
          git diff --quiet && git diff --staged --quiet || git commit -m "Update freenode.yaml $(date '+%Y-%m-%d %H:%M:%S')"
          git push
